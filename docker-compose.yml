version: '3.8'

services:
  mongodb:
    image: mongo:latest
    container_name: job_hunter_db
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: password
    volumes:
      - mongodb_data:/data/db
    networks:
      - job_hunter_network
    restart: unless-stopped

  job-hunter-bot:
    build: .
    container_name: job_hunter_bot
    environment:
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN}
      - TELEGRAM_API_ID=${TELEGRAM_API_ID}
      - TELEGRAM_API_HASH=${TELEGRAM_API_HASH}
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - GROQ_API_KEY=${GROQ_API_KEY}
      - HUGGINGFACE_API_KEY=${HUGGINGFACE_API_KEY}
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY}
      - MONGODB_URI=mongodb://admin:password@mongodb:27017/job_hunter
    depends_on:
      - mongodb
    networks:
      - job_hunter_network
    restart: unless-stopped
    volumes:
      - ./resumes:/app/resumes
      - ./logs:/app/logs

  api:
    build: .
    container_name: job_hunter_api
    command: python -m uvicorn app:app --host 0.0.0.0 --port 8000
    ports:
      - "8000:8000"
    environment:
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN}
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - MONGODB_URI=mongodb://admin:password@mongodb:27017/job_hunter
    depends_on:
      - mongodb
    networks:
      - job_hunter_network
    restart: unless-stopped

volumes:
  mongodb_data:

networks:
  job_hunter_network:
    driver: bridge
